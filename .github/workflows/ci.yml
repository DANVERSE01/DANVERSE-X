name: CI

on:
  push:
    branches: [main, production-improvements]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Install, Build, Typecheck, Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
